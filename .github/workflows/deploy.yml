name: deploy-blog-runtime

on:
  push:
    branches:
      - main
    paths:
      - "content/**"
      - "public/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger remote deploy
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.GATEWAY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -H ${{ secrets.GATEWAY_HOST }} >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/id_ed25519 minliny@${{ secrets.GATEWAY_HOST }} \
            "/opt/scripts/deploy-blog.sh"

      - name: Send repository_dispatch to infra-gateway
        shell: bash
        env:
          DISPATCH_TOKEN: ${{ secrets.INFRA_GATEWAY_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${DISPATCH_TOKEN}" ]; then
            echo "missing secret: INFRA_GATEWAY_DISPATCH_TOKEN" >&2
            exit 1
          fi

          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            https://api.github.com/repos/minliny/infra-gateway/dispatches \
            -d @- <<'JSON'
          {
            "event_type": "blog-amytis-deploy",
            "client_payload": {
              "repository": "minliny/blog-amytis",
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref }}",
              "actor": "${{ github.actor }}",
              "source_workflow": "deploy.yml"
            }
          }
          JSON
