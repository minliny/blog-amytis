backend:
  name: github
  repo: minliny/blog-amytis
  branch: main
  base_url: https://auth.minliny.com
  auth_endpoint: /auth

publish_mode: simple

media_folder: public/uploads
public_folder: /uploads

site_url: https://blog.minliny.com
display_url: https://blog.minliny.com
logo_url: /favicon.ico

collections:
  - name: posts
    label: Posts
    label_singular: Post
    folder: content/posts
    create: true
    delete: true
    extension: mdx
    format: frontmatter
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "posts/{{slug}}"
    editor:
      preview: false
    fields:
      - label: Title
        name: title
        widget: string

      - label: Date
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: false

      - label: Excerpt
        name: excerpt
        widget: text
        required: false

      - label: Category
        name: category
        widget: string
        required: false

      - label: Tags
        name: tags
        widget: list
        required: false
        field:
          label: Tag
          name: tag
          widget: string

      - label: Slug
        name: slug
        widget: string
        required: false

      - label: LeetCode ID
        name: leetcodeId
        widget: number
        value_type: int
        required: false

      - label: Difficulty
        name: difficulty
        widget: select
        required: false
        options:
          - Easy
          - Medium
          - Hard

      - label: Language
        name: language
        widget: string
        required: false

      - label: Source
        name: source
        widget: string
        required: false

      - label: Submission Time
        name: submissionTime
        widget: datetime
        required: false

      - label: LeetCode Problem URL
        name: problemUrl
        widget: string
        required: false

      - label: Solution Summary
        name: solutionSummary
        widget: text
        required: false

      - label: Complexity
        name: complexity
        widget: object
        required: false
        fields:
          - label: Time
            name: time
            widget: string
            required: false
          - label: Space
            name: space
            widget: string
            required: false

      - label: Study Suggestions
        name: studySuggestions
        widget: list
        required: false
        field:
          label: Suggestion
          name: suggestion
          widget: string

      - label: Authors
        name: authors
        widget: list
        required: false
        field:
          label: Author
          name: author
          widget: string

      - label: Redirect From
        name: redirectFrom
        widget: list
        required: false
        field:
          label: Old Path
          name: old_path
          widget: string

      - label: Body
        name: body
        widget: markdown
